<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Chat · Room</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #eef2fc;
        }

        .join-screen {
            background: #141a26;
            border-radius: 40px;
            padding: 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
        }

        .join-screen h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #f0f4ff;
        }

        .join-screen .sub {
            color: #8d9fd0;
            margin-bottom: 30px;
        }

        .join-screen input {
            width: 100%;
            padding: 14px 18px;
            background: #0f1625;
            border: 2px solid rgba(255, 255, 255, 0.04);
            border-radius: 60px;
            color: #f0f4ff;
            font-size: 20px;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            margin-bottom: 12px;
            transition: 0.15s;
        }

        .join-screen input:focus {
            border-color: #6c5ce7;
            background: #141d30;
        }

        .join-screen input::placeholder {
            color: #3a4666;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .join-screen .name-input {
            font-size: 16px;
            letter-spacing: 0;
            text-align: left;
            padding: 14px 18px;
        }

        .join-screen .join-btn {
            width: 100%;
            padding: 16px;
            background: #6c5ce7;
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.3);
            margin-top: 10px;
        }

        .join-screen .join-btn:hover {
            background: #7c6df5;
            transform: scale(1.01);
        }

        .join-screen .join-btn:active {
            transform: scale(0.97);
        }

        .join-screen .error {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }

        .chat-app {
            width: 100%;
            max-width: 700px;
            background: #141a26;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .chat-app.hidden {
            display: none;
        }

        .chat-header {
            padding: 18px 24px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .room-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .room-badge {
            background: #2a3349;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 14px;
            color: #bcc8f0;
        }

        .room-badge span {
            font-family: monospace;
            font-weight: 700;
            font-size: 18px;
            color: #c8d6ff;
            letter-spacing: 2px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #9aa9cf;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #00e676;
            display: inline-block;
            animation: pulse 1.8s infinite;
        }

        .status-dot.disconnected {
            background: #ff5252;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .messages {
            padding: 20px;
            max-height: 420px;
            min-height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #3f4a68;
            border-radius: 20px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 22px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-left {
            align-self: flex-start;
            background: #293040;
            color: #f0f4ff;
            border-bottom-left-radius: 6px;
        }

        .message-right {
            align-self: flex-end;
            background: #6c5ce7;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message-system {
            align-self: center;
            background: rgba(255, 255, 255, 0.04);
            color: #8d9fd0;
            font-size: 13px;
            padding: 6px 16px;
            border-radius: 40px;
            max-width: 90%;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 6px;
            font-size: 10px;
            opacity: 0.55;
            color: #c8d0e6;
        }

        .message-right .message-meta {
            color: #ddd6ff;
            opacity: 0.75;
        }

        .sender-name {
            font-weight: 600;
        }

        .input-area {
            padding: 16px 20px 24px;
            background: rgba(0, 0, 0, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            background: #101724;
            border: none;
            padding: 14px 18px;
            border-radius: 60px;
            color: #f0f4ff;
            font-size: 15px;
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.15s;
        }

        .input-area input:focus {
            border-color: #6c5ce7;
            background: #1a2236;
        }

        .input-area input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-area button {
            background: #6c5ce7;
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }

        .input-area button:hover:not(:disabled) {
            background: #7c6df5;
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-footer {
            padding: 10px 24px;
            background: rgba(0, 0, 0, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 12px;
            color: #6c7ca3;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .server-status {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            font-size: 12px;
            color: #8d9fd0;
        }

        @media (max-width: 480px) {
            .join-screen {
                padding: 30px 20px;
            }
            .input-area {
                flex-direction: column;
            }
            .message {
                max-width: 92%;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- JOIN SCREEN -->
    <div class="join-screen" id="joinScreen">
        <h1>🔑 Private Chat</h1>
        <div class="sub">Connect with your friend</div>

        <input type="text" id="roomInput" placeholder="Enter room code" maxlength="6" />
        <input type="text" id="nameInput" class="name-input" placeholder="Your name" value="den" />
        <input type="text" id="serverInput" class="name-input" placeholder="Server URL (optional)" value="" style="font-size:14px; letter-spacing:0; text-align:left;" />
        <button class="join-btn" id="joinBtn">Join Room</button>
        <div class="error" id="errorMsg"></div>
    </div>

    <!-- CHAT APP -->
    <div class="chat-app hidden" id="chatApp">
        <div class="chat-header">
            <div class="room-info">
                <div class="room-badge">
                    🏠 Room <span id="roomDisplay">------</span>
                </div>
                <div class="connection-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Connected</span>
                </div>
            </div>
            <button id="leaveBtn" style="background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.1); color: #ff8a8a; padding: 6px 16px; border-radius: 40px; cursor: pointer;">
                ✕ Leave
            </button>
        </div>

        <div class="messages" id="messageContainer"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." />
            <button id="sendBtn">Send</button>
        </div>

        <div class="chat-footer">
            <span>🔒 Private room</span>
            <span id="userDisplay">You: den</span>
            <span class="server-status" id="serverDisplay">🌐 Server: loading...</span>
        </div>
    </div>

    <script>
        // ----- Configuration -----
        // Default server URL - change this to your Render backend URL
        const DEFAULT_SERVER = 'wss://private-chat-backend.onrender.com';
        // For local testing: 'ws://localhost:3000'

        // ----- DOM elements -----
        const joinScreen = document.getElementById('joinScreen');
        const chatApp = document.getElementById('chatApp');
        const roomInput = document.getElementById('roomInput');
        const nameInput = document.getElementById('nameInput');
        const serverInput = document.getElementById('serverInput');
        const joinBtn = document.getElementById('joinBtn');
        const errorMsg = document.getElementById('errorMsg');
        const roomDisplay = document.getElementById('roomDisplay');
        const messageContainer = document.getElementById('messageContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const leaveBtn = document.getElementById('leaveBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const userDisplay = document.getElementById('userDisplay');
        const serverDisplay = document.getElementById('serverDisplay');

        // ----- State -----
        let ws = null;
        let currentRoom = null;
        let userName = 'den';
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 5;

        // ----- Helper functions -----
        function showError(msg) {
            errorMsg.textContent = msg;
            setTimeout(() => { errorMsg.textContent = ''; }, 3000);
        }

        function addMessage(text, sender, time) {
            const div = document.createElement('div');
            
            if (sender === 'system') {
                div.className = 'message message-system';
                div.textContent = text;
            } else {
                const isMe = sender === userName;
                div.className = `message ${isMe ? 'message-right' : 'message-left'}`;
                div.innerHTML = `
                    <div>${text}</div>
                    <div class="message-meta">
                        <span class="sender-name">${sender}</span>
                        <span>${time || new Date().toLocaleTimeString()}</span>
                    </div>
                `;
            }
            
            messageContainer.appendChild(div);
            messageContainer.scrollTop = messageContainer.scrollHeight;
        }

        function setConnectionStatus(connected) {
            if (connected) {
                statusDot.className = 'status-dot';
                statusText.textContent = 'Connected';
                messageInput.disabled = false;
                sendBtn.disabled = false;
            } else {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = 'Disconnected';
                messageInput.disabled = true;
                sendBtn.disabled = true;
            }
        }

        function connectToRoom(roomCode, name, serverUrl) {
            // Use provided server or default
            const wsUrl = serverUrl || DEFAULT_SERVER;
            serverDisplay.textContent = `🌐 ${wsUrl.replace('wss://', '').replace('ws://', '')}`;
            
            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    setConnectionStatus(true);
                    reconnectAttempts = 0;
                    
                    ws.send(JSON.stringify({
                        type: 'join',
                        roomCode: roomCode,
                        name: name
                    }));
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        
                        switch(data.type) {
                            case 'joined':
                                currentRoom = roomCode;
                                roomDisplay.textContent = roomCode;
                                userDisplay.textContent = `You: ${name}`;
                                addMessage(`✅ ${data.message}`, 'system');
                                break;
                                
                            case 'message':
                                addMessage(data.text, data.sender, data.time);
                                break;
                                
                            case 'system':
                                addMessage(data.message, 'system');
                                break;
                                
                            case 'error':
                                showError(data.message);
                                break;
                        }
                    } catch (error) {
                        console.error('Error parsing message:', error);
                    }
                };

                ws.onclose = () => {
                    setConnectionStatus(false);
                    addMessage('❌ Disconnected from server', 'system');
                    
                    // Auto-reconnect
                    if (currentRoom && reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                        reconnectAttempts++;
                        setTimeout(() => {
                            addMessage(`🔄 Reconnecting... (attempt ${reconnectAttempts})`, 'system');
                            connectToRoom(currentRoom, userName, wsUrl);
                        }, 2000 * reconnectAttempts);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    showError('Connection failed. Check server URL.');
                };
            } catch (error) {
                showError('Failed to connect: ' + error.message);
            }
        }

        function leaveRoom() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'leave'
                }));
                ws.close();
            }
            ws = null;
            currentRoom = null;
            reconnectAttempts = 0;
            chatApp.classList.add('hidden');
            joinScreen.style.display = 'block';
            messageContainer.innerHTML = '';
            roomInput.value = '';
            setConnectionStatus(false);
        }

        // ----- Event listeners -----
        joinBtn.addEventListener('click', () => {
            const roomCode = roomInput.value.trim();
            const name = nameInput.value.trim() || 'Anonymous';
            const serverUrl = serverInput.value.trim();
            
            if (!roomCode || roomCode.length !== 6 || !/^\d{6}$/.test(roomCode)) {
                showError('Please enter a valid 6-digit room code');
                return;
            }
            
            userName = name;
            joinScreen.style.display = 'none';
            chatApp.classList.remove('hidden');
            connectToRoom(roomCode, name, serverUrl);
        });

        roomInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinBtn.click();
        });

        nameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinBtn.click();
        });

        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            ws.send(JSON.stringify({
                type: 'message',
                text: text,
                time: new Date().toLocaleTimeString()
            }));
            
            messageInput.value = '';
            messageInput.focus();
        });

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });

        leaveBtn.addEventListener('click', leaveRoom);

        // Auto-focus
        roomInput.focus();

        // Load saved server URL
        const savedServer = localStorage.getItem('chatServerUrl');
        if (savedServer) {
            serverInput.value = savedServer;
        }

        // Save server URL on change
        serverInput.addEventListener('change', () => {
            localStorage.setItem('chatServerUrl', serverInput.value);
        });

        console.log('💬 Private chat client ready!');
        console.log('📡 Connect to your Render backend or use default');
    </script>
</body>
</html>
