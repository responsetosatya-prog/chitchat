<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>💕 ChitChat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --primary: #6c5ce7;
            --primary-dark: #4a3cb5;
            --bg: #0b0e14;
            --bg-light: #1a1f2f;
            --text: #eef2fc;
            --text-secondary: #9aa9cf;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --radius: 20px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: 800px;
            display: flex;
            flex-direction: column;
        }

        /* Login Screen */
        .login-screen {
            background: rgba(20, 26, 38, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 32px 24px;
            width: 100%;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.05);
            margin: auto;
        }
        .login-screen .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 8px;
        }
        .login-screen h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d, #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .login-screen .sub {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .login-screen input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: var(--text);
            font-size: 16px;
            outline: none;
            margin-bottom: 12px;
        }
        .login-screen input:focus {
            border-color: var(--primary);
            background: rgba(108, 92, 231, 0.1);
        }
        .login-screen .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        .login-screen .btn-primary:active {
            transform: scale(0.97);
        }
        .login-screen .toggle-form {
            text-align: center;
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .login-screen .toggle-form span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
        }
        .login-screen .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
            min-height: 20px;
        }
        .hidden { display: none !important; }

        /* Chat UI */
        .chat-ui {
            display: none;
            flex: 1;
            flex-direction: column;
            background: rgba(20, 26, 38, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.05);
            height: 100%;
        }
        .chat-ui.active { display: flex; }

        /* Chat Header */
        .chat-header {
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        .chat-header .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #a29bfe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: white;
        }
        .chat-header .user-details h3 { font-size: 16px; font-weight: 600; }
        .chat-header .user-details p { font-size: 12px; color: var(--text-secondary); }
        .chat-header .header-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            padding: 4px 8px;
            cursor: pointer;
        }

        /* Search Bar */
        .search-bar {
            padding: 8px 16px;
            background: rgba(0,0,0,0.2);
            position: relative;
            flex-shrink: 0;
        }
        .search-bar input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        .search-bar input:focus { border-color: var(--primary); }
        .search-results {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-light);
            border-radius: 12px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: var(--shadow);
        }
        .search-results .result-item {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .search-results .result-item:active { background: rgba(108, 92, 231, 0.2); }

        /* Chat List */
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .chat-item:active { background: rgba(108, 92, 231, 0.1); }
        .chat-item .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #a29bfe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }
        .chat-item .chat-info { flex: 1; min-width: 0; }
        .chat-item .chat-info h4 { font-size: 15px; font-weight: 500; }
        .chat-item .chat-info p { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Chat View */
        .chat-view {
            display: none;
            flex-direction: column;
            flex: 1;
            height: 100%;
        }
        .chat-view.active { display: flex; }

        .chat-view .chat-view-header {
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        .chat-view .chat-view-header .back-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            padding: 0 4px;
        }
        .chat-view .chat-view-header .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #a29bfe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }
        .chat-view .chat-view-header .chat-name { flex: 1; font-weight: 600; font-size: 16px; }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }
        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            align-self: flex-start;
            background: var(--bg-light);
            border-bottom-left-radius: 4px;
        }
        .message .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; display: block; }
        .message .msg-sender { font-size: 12px; font-weight: 600; color: #a29bfe; margin-bottom: 2px; display: block; }
        .message .file-preview { max-width: 200px; max-height: 200px; border-radius: 8px; margin-top: 4px; cursor: pointer; }

        .input-area {
            padding: 8px 12px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            outline: none;
        }
        .input-area input:focus { border-color: var(--primary); }
        .input-area button {
            padding: 10px 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .input-area button:active { transform: scale(0.95); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-light);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            z-index: 100;
            max-width: 90%;
            text-align: center;
        }

        @media (max-width: 480px) {
            body { padding: 4px; }
            .login-screen { padding: 24px 16px; }
            .message { max-width: 92%; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Login Screen -->
        <div class="login-screen" id="loginScreen">
            <div class="logo">💕</div>
            <h1>ChitChat</h1>
            <div class="sub">Connect with friends privately</div>
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Username" />
                <input type="password" id="loginPassword" placeholder="Password" />
                <button class="btn-primary" id="loginBtn">Sign In</button>
                <div class="toggle-form">
                    Don't have an account? <span id="showRegister">Sign Up</span>
                </div>
            </div>
            <div id="registerForm" class="hidden">
                <input type="text" id="regUsername" placeholder="Username" />
                <input type="text" id="regDisplayName" placeholder="Display Name" />
                <input type="password" id="regPassword" placeholder="Password" />
                <button class="btn-primary" id="registerBtn">Create Account</button>
                <div class="toggle-form">
                    Already have an account? <span id="showLogin">Sign In</span>
                </div>
            </div>
            <div class="error-msg" id="authError"></div>
        </div>

        <!-- Chat UI -->
        <div class="chat-ui" id="chatUi">
            <div class="chat-header">
                <div class="user-info">
                    <div class="avatar" id="myAvatar">💕</div>
                    <div class="user-details">
                        <h3 id="myDisplayName">User</h3>
                        <p id="myStatus">Online</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="logoutBtn">🚪</button>
                </div>
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search users..." />
                <div class="search-results" id="searchResults"></div>
            </div>

            <div class="chat-list" id="chatList">
                <div style="text-align:center;color:var(--text-secondary);padding:40px 20px;">
                    <div style="font-size:48px;margin-bottom:12px;">💬</div>
                    <p>Search for friends to start chatting</p>
                </div>
            </div>

            <div class="chat-view" id="chatView">
                <div class="chat-view-header">
                    <button class="back-btn" id="backToChats">←</button>
                    <div class="avatar" id="chatAvatar">👤</div>
                    <div class="chat-name" id="chatName">User</div>
                </div>
                <div class="messages-container" id="messagesContainer">
                    <div style="text-align:center;color:var(--text-secondary);padding:40px 20px;font-size:14px;">
                        No messages yet. Start chatting! 💕
                    </div>
                </div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Type a message..." />
                    <button id="sendBtn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ----- CONFIGURATION -----
        const API_URL = 'https://chitchat-backend-61t4.onrender.com';
        const WS_URL = 'wss://chitchat-backend-61t4.onrender.com';

        // ----- STATE -----
        let currentUser = null;
        let token = null;
        let ws = null;
        let currentChatId = null;
        let currentChatType = null; // 'user' or 'group'
        let currentChatName = '';
        let onlineUsers = new Set();
        let friends = [];

        // ----- DOM -----
        const $ = id => document.getElementById(id);
        const loginScreen = $('loginScreen');
        const chatUi = $('chatUi');
        const loginForm = $('loginForm');
        const registerForm = $('registerForm');
        const loginBtn = $('loginBtn');
        const registerBtn = $('registerBtn');
        const showRegister = $('showRegister');
        const showLogin = $('showLogin');
        const authError = $('authError');
        const loginUsername = $('loginUsername');
        const loginPassword = $('loginPassword');
        const regUsername = $('regUsername');
        const regDisplayName = $('regDisplayName');
        const regPassword = $('regPassword');
        const myDisplayName = $('myDisplayName');
        const myAvatar = $('myAvatar');
        const logoutBtn = $('logoutBtn');
        const searchInput = $('searchInput');
        const searchResults = $('searchResults');
        const chatList = $('chatList');
        const chatView = $('chatView');
        const backToChats = $('backToChats');
        const chatAvatar = $('chatAvatar');
        const chatName = $('chatName');
        const messagesContainer = $('messagesContainer');
        const messageInput = $('messageInput');
        const sendBtn = $('sendBtn');

        // ----- UTILITY -----
        function showAuthError(msg) {
            authError.textContent = msg;
            setTimeout(() => authError.textContent = '', 4000);
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const div = document.createElement('div');
            div.className = 'toast';
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function formatTime(date) {
            return new Date(date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function getInitials(name) {
            return name ? name.charAt(0).toUpperCase() : '👤';
        }

        // ----- API -----
        async function apiCall(endpoint, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const res = await fetch(`${API_URL}${endpoint}`, { ...options, headers });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error || 'API error');
            }
            return res.json();
        }

        // ----- AUTH -----
        async function login(username, password) {
            try {
                const data = await apiCall('/api/login', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });
                token = data.token;
                currentUser = data.user;
                localStorage.setItem('chitchat_token', token);
                localStorage.setItem('chitchat_user', JSON.stringify(currentUser));
                showApp();
            } catch (e) {
                showAuthError(e.message);
            }
        }

        async function register(username, password, displayName) {
            try {
                const data = await apiCall('/api/register', {
                    method: 'POST',
                    body: JSON.stringify({ username, password, displayName })
                });
                token = data.token;
                currentUser = data.user;
                localStorage.setItem('chitchat_token', token);
                localStorage.setItem('chitchat_user', JSON.stringify(currentUser));
                showApp();
            } catch (e) {
                showAuthError(e.message);
            }
        }

        async function logout() {
            if (ws) {
                ws.send(JSON.stringify({ type: 'logout' }));
                ws.close();
            }
            localStorage.removeItem('chitchat_token');
            localStorage.removeItem('chitchat_user');
            token = null;
            currentUser = null;
            ws = null;
            showLoginScreen();
        }

        // ----- UI NAV -----
        function showApp() {
            loginScreen.style.display = 'none';
            chatUi.classList.add('active');
            myDisplayName.textContent = currentUser.displayName || currentUser.username;
            myAvatar.textContent = getInitials(currentUser.displayName || currentUser.username);
            connectWebSocket();
        }

        function showLoginScreen() {
            loginScreen.style.display = 'block';
            chatUi.classList.remove('active');
            chatView.classList.remove('active');
            chatList.innerHTML = '';
            messagesContainer.innerHTML = '';
        }

        // ----- WEBSOCKET -----
        function connectWebSocket() {
            if (!token) return;
            if (ws && ws.readyState === WebSocket.OPEN) return;

            console.log('🔗 Connecting WebSocket...');
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                console.log('🔗 WebSocket opened, sending auth...');
                ws.send(JSON.stringify({ type: 'auth', token: token }));
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    console.log('📨 Received:', data.type, data);
                    handleWSMessage(data);
                } catch (e) {
                    console.error('❌ Parse error:', e);
                }
            };

            ws.onclose = () => {
                console.log('🔌 WebSocket closed');
                setTimeout(() => { if (token) connectWebSocket(); }, 3000);
            };

            ws.onerror = (error) => {
                console.error('❌ WebSocket error:', error);
            };
        }

        function handleWSMessage(data) {
            switch(data.type) {
                case 'auth_success':
                    console.log('✅ Authenticated!');
                    if (data.onlineUsers) {
                        onlineUsers = new Set(data.onlineUsers);
                    }
                    loadFriends();
                    break;

                case 'user_status':
                    console.log(`📡 ${data.username} is ${data.status}`);
                    if (data.status === 'online') {
                        onlineUsers.add(data.userId);
                    } else {
                        onlineUsers.delete(data.userId);
                    }
                    renderChatList();
                    break;

                case 'private_message':
                    console.log(`💬 Message from ${data.senderName}: "${data.content}"`);
                    if (currentChatType === 'user' && currentChatId === data.senderId) {
                        addMessage(data, false);
                    }
                    if (data.senderId !== currentUser.id) {
                        showToast(`💬 ${data.senderName}: ${data.content}`);
                    }
                    renderChatList();
                    break;

                case 'group_message':
                    console.log(`💬 Group message from ${data.senderName}: "${data.content}"`);
                    if (currentChatType === 'group' && currentChatId === data.groupId) {
                        addMessage(data, false);
                    }
                    if (data.senderId !== currentUser.id) {
                        showToast(`💬 ${data.senderName}: ${data.content}`);
                    }
                    renderChatList();
                    break;

                case 'error':
                    showToast('❌ ' + data.message);
                    break;
            }
        }

        // ----- FRIENDS -----
        async function loadFriends() {
            try {
                const data = await apiCall(`/api/users/${currentUser.id}/friends`);
                friends = data.friends || [];
                renderChatList();
            } catch (e) {
                console.error('Load friends error:', e);
            }
        }

        // ----- RENDER -----
        function renderChatList() {
            if (!friends.length) {
                chatList.innerHTML = `
                    <div style="text-align:center;color:var(--text-secondary);padding:40px 20px;">
                        <div style="font-size:48px;margin-bottom:12px;">💬</div>
                        <p>Search for friends to start chatting</p>
                    </div>
                `;
                return;
            }

            chatList.innerHTML = friends.map(f => `
                <div class="chat-item" onclick="openChat('user', '${f.id}', '${f.displayName || f.username}')">
                    <div class="avatar">${getInitials(f.displayName || f.username)}</div>
                    <div class="chat-info">
                        <h4>${f.displayName || f.username}</h4>
                        <p>${onlineUsers.has(f.id) ? '🟢 Online' : '⚪ Offline'}</p>
                    </div>
                    <span>${onlineUsers.has(f.id) ? '🟢' : '⚪'}</span>
                </div>
            `).join('');
        }

        // ----- OPEN CHAT -----
        window.openChat = function(type, id, name) {
            currentChatId = id;
            currentChatType = type;
            currentChatName = name;

            chatView.classList.add('active');
            chatName.textContent = name;
            chatAvatar.textContent = getInitials(name);

            messagesContainer.innerHTML = `
                <div style="text-align:center;color:var(--text-secondary);padding:40px 20px;font-size:14px;">
                    Loading messages...
                </div>
            `;

            loadMessages(type, id);
        };

        // ----- LOAD MESSAGES -----
        async function loadMessages(type, id) {
            try {
                let endpoint;
                if (type === 'user') {
                    endpoint = `/api/messages/${currentUser.id}/${id}`;
                } else {
                    endpoint = `/api/groups/${id}/messages`;
                }
                const data = await apiCall(endpoint);
                messagesContainer.innerHTML = '';
                if (data.messages && data.messages.length) {
                    data.messages.forEach(msg => {
                        addMessage(msg, msg.sender_id === currentUser.id);
                    });
                } else {
                    messagesContainer.innerHTML = `
                        <div style="text-align:center;color:var(--text-secondary);padding:40px 20px;font-size:14px;">
                            No messages yet. Start chatting! 💕
                        </div>
                    `;
                }
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } catch (e) {
                console.error('Load messages error:', e);
                showToast('❌ Failed to load messages');
            }
        }

        // ----- ADD MESSAGE -----
        function addMessage(msg, isSent) {
            const empty = messagesContainer.querySelector('div[style]');
            if (empty) empty.remove();

            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;

            let content = msg.content || msg.text || '';
            if (msg.message_type === 'file' && msg.file_url) {
                content = `<a href="${API_URL}${msg.file_url}" target="_blank">📎 ${content}</a>`;
            }

            div.innerHTML = `
                ${!isSent ? `<span class="msg-sender">${msg.display_name || msg.username || 'User'}</span>` : ''}
                ${content}
                <span class="msg-time">${formatTime(msg.created_at || msg.time || new Date())}</span>
            `;

            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ----- SEND MESSAGE -----
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentChatId) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                showToast('❌ Not connected');
                connectWebSocket();
                return;
            }

            const msgData = {
                type: currentChatType === 'user' ? 'private_message' : 'group_message',
                [currentChatType === 'user' ? 'receiverId' : 'groupId']: currentChatId,
                content: text,
                messageType: 'text',
                time: new Date().toISOString()
            };

            // Add to UI
            const tempMsg = {
                sender_id: currentUser.id,
                content: text,
                created_at: new Date().toISOString(),
                message_type: 'text',
                display_name: currentUser.displayName
            };
            addMessage(tempMsg, true);

            // Send via WebSocket
            ws.send(JSON.stringify(msgData));
            messageInput.value = '';
        }

        // ----- SEARCH -----
        searchInput.addEventListener('input', async function() {
            const query = this.value.trim();
            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }

            try {
                const data = await apiCall(`/api/users/search?q=${encodeURIComponent(query)}`);
                if (data.users && data.users.length) {
                    searchResults.innerHTML = data.users.map(u => `
                        <div class="result-item" onclick="addFriend('${u.id}', '${u.displayName || u.username}')">
                            <span>${getInitials(u.displayName || u.username)}</span>
                            <span>${u.displayName || u.username}</span>
                            ${u.online ? '🟢' : '⚪'}
                        </div>
                    `).join('');
                    searchResults.style.display = 'block';
                } else {
                    searchResults.innerHTML = '<div style="padding:10px 14px;color:var(--text-secondary);">No users found</div>';
                    searchResults.style.display = 'block';
                }
            } catch (e) {
                console.error('Search error:', e);
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-bar')) {
                searchResults.style.display = 'none';
            }
        });

        async function addFriend(userId, name) {
            searchResults.style.display = 'none';
            searchInput.value = '';
            
            try {
                await apiCall(`/api/users/${currentUser.id}/friends`, {
                    method: 'POST',
                    body: JSON.stringify({ friendId: userId })
                });
                showToast(`✅ Added ${name} as friend!`);
                loadFriends();
            } catch (e) {
                showToast('❌ ' + e.message);
            }
        }

        // ----- EVENT LISTENERS -----
        loginBtn.addEventListener('click', () => {
            login(loginUsername.value.trim(), loginPassword.value.trim());
        });

        registerBtn.addEventListener('click', () => {
            register(regUsername.value.trim(), regPassword.value.trim(), regDisplayName.value.trim());
        });

        showRegister.addEventListener('click', () => {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            authError.textContent = '';
        });

        showLogin.addEventListener('click', () => {
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            authError.textContent = '';
        });

        logoutBtn.addEventListener('click', logout);

        backToChats.addEventListener('click', () => {
            chatView.classList.remove('active');
            currentChatId = null;
            currentChatType = null;
        });

        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        loginPassword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
        regPassword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') registerBtn.click();
        });

        // ----- AUTO-LOGIN -----
        (function init() {
            const savedToken = localStorage.getItem('chitchat_token');
            const savedUser = localStorage.getItem('chitchat_user');
            if (savedToken && savedUser) {
                token = savedToken;
                currentUser = JSON.parse(savedUser);
                showApp();
            }
        })();

        console.log('💕 ChitChat loaded!');
        console.log('📡 Server:', API_URL);
    </script>
</body>
</html>
